<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Utama - SI PRESTISE</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="Logosiprestise.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = { darkMode: 'class' }
        // Pengecekan tema INSTAN sebelum body dimuat agar tidak berkedip
        (function() {
            if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
    
    <style>
        .pattern-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .dark .pattern-bg {
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
        }
    </style>
</head>
<body class="pattern-bg min-h-screen flex flex-col items-center justify-center p-4 relative text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <!-- Tombol Tema -->
    <div class="absolute top-6 right-6 md:top-10 md:right-10 z-10">
        <button id="theme-toggle" type="button" class="text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm border border-slate-200 dark:border-slate-700 rounded-full p-2.5 md:p-3 transition shadow-sm hover:shadow-md cursor-pointer">
            <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-lg text-blue-900 dark:text-blue-300"></i>
            <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-lg text-yellow-400"></i>
        </button>
    </div>

    <!-- Container Utama -->
    <div class="bg-white dark:bg-slate-800 p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-lg border border-slate-100 dark:border-slate-700 relative overflow-hidden transition-colors duration-300">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-700 to-sky-400"></div>

        <div class="text-center mb-8 mt-2">
            <img src="Logosiprestise.png" alt="Logo SI PRESTISE" class="h-20 md:h-24 w-auto mx-auto object-contain drop-shadow-md mb-4 transition-transform hover:scale-105 duration-300">
            <h1 class="text-2xl md:text-3xl font-extrabold text-blue-900 dark:text-blue-300 tracking-wide">Portal Akses</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Pilih layanan SI PRESTISE di bawah ini</p>
        </div>

        <!-- Grid untuk 2 Tombol Besar -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
            
            <!-- Link 1: Dasbor Admin -->
            <a href="landing.html" class="group flex flex-col items-center text-center bg-slate-50 dark:bg-slate-700/50 hover:bg-blue-50 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-600 hover:border-blue-400 dark:hover:border-blue-500 p-6 rounded-2xl transition-all duration-300 hover:-translate-y-1 hover:shadow-lg cursor-pointer">
                <div class="bg-blue-100 dark:bg-blue-900/50 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-solid fa-chart-pie text-3xl text-blue-600 dark:text-blue-400"></i>
                </div>
                <h3 class="font-bold text-slate-800 dark:text-slate-200 mb-1 text-lg">Dasbor Web</h3>
                <p class="text-xs text-slate-500 dark:text-slate-400">Rekapitulasi kehadiran & statistik siswa.</p>
            </a>

            <!-- Link 2: Telegram Bot -->
            <!-- UBAH LINK T.ME DI BAWAH INI DENGAN USERNAME BOT ANDA -->
            <a href="https://t.me/SIPRESTISE_bot" target="_blank" class="group flex flex-col items-center text-center bg-slate-50 dark:bg-slate-700/50 hover:bg-sky-50 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-600 hover:border-sky-400 dark:hover:border-sky-500 p-6 rounded-2xl transition-all duration-300 hover:-translate-y-1 hover:shadow-lg cursor-pointer">
                <div class="bg-sky-100 dark:bg-sky-900/50 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-brands fa-telegram text-3xl text-sky-500 dark:text-sky-400"></i>
                </div>
                <h3 class="font-bold text-slate-800 dark:text-slate-200 mb-1 text-lg">Telegram Bot</h3>
                <p class="text-xs text-slate-500 dark:text-slate-400">Terima notifikasi real-time untuk orang tua.</p>
            </a>

        </div>
    </div>

    <script>
        // Logika Toggle Tema
        var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        var themeToggleBtn = document.getElementById('theme-toggle');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
    </script>
</body>
</html>

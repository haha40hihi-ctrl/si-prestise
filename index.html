<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Utama - SI PRESTISE</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="Logosiprestise.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {
                fontFamily: { serif: ['Fraunces', 'serif'], sans: ['Inter', 'sans-serif'] },
                colors: {
                    ink: { 50:'#f2f4f8', 100:'#dfe4ee', 300:'#8d9ab5', 500:'#33456e', 700:'#1c2b4d', 800:'#141f38', 900:'#0d1526' },
                    royal: { 50:'#eef2ff', 100:'#dce4ff', 400:'#5c7ef0', 500:'#3a5fe0', 600:'#2c4bc9', 700:'#233ba3' },
                    gold: { 50:'#fdf8ec', 100:'#faedc4', 300:'#eecb72', 400:'#e2b64d', 500:'#d4a93a', 600:'#b3872a' },
                    paper: { 50:'#faf7f0', 100:'#f3eee1' }
                }
            } }
        }
        // Pengecekan tema INSTAN sebelum body dimuat agar tidak berkedip
        (function() {
            if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Fraunces', serif; }
        .pattern-bg {
            background-color: #faf7f0;
            background-image: radial-gradient(#e2d9c3 1px, transparent 1px);
            background-size: 22px 22px;
        }
        .dark .pattern-bg {
            background-color: #0d1526;
            background-image: radial-gradient(#1c2b4d 1px, transparent 1px);
        }
        .gold-underline { position: relative; display: inline-block; }
        .gold-underline::after {
            content: ''; position: absolute; left: 2px; right: 2px; bottom: -6px; height: 3px;
            background: linear-gradient(90deg, #d4a93a, #eecb72); border-radius: 2px;
        }
    </style>
</head>
<body class="pattern-bg min-h-screen flex flex-col items-center justify-center p-4 relative text-ink-800 dark:text-ink-100 transition-colors duration-300">

    <!-- Tombol Tema -->
    <div class="absolute top-6 right-6 md:top-10 md:right-10 z-10">
        <button id="theme-toggle" type="button" class="text-ink-500 dark:text-ink-300 hover:bg-paper-100 dark:hover:bg-ink-700 bg-white/80 dark:bg-ink-800/80 backdrop-blur-sm border border-ink-100 dark:border-ink-700 rounded-full p-2.5 md:p-3 transition shadow-sm hover:shadow-md cursor-pointer">
            <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-lg text-royal-600 dark:text-gold-400"></i>
            <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-lg text-gold-500"></i>
        </button>
    </div>

    <!-- Container Utama -->
    <div class="bg-white dark:bg-ink-800 p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-lg border border-ink-100/70 dark:border-ink-700 relative overflow-hidden transition-colors duration-300">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-royal-600 via-royal-500 to-gold-400"></div>

        <div class="text-center mb-8 mt-2">
            <img src="Logosiprestise.png" alt="Logo SI PRESTISE" class="h-20 md:h-24 w-auto mx-auto object-contain drop-shadow-md mb-4 transition-transform hover:scale-105 duration-300">
            <h1 class="font-display text-2xl md:text-3xl font-semibold text-ink-800 dark:text-paper-50 tracking-wide gold-underline">Portal Akses</h1>
            <p class="text-sm text-ink-500 dark:text-ink-300 mt-3">Pilih layanan SI PRESTISE di bawah ini</p>
        </div>

        <!-- Grid untuk 2 Tombol Besar -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
            
            <!-- Link 1: Dasbor Admin -->
            <a href="landing.html" class="group flex flex-col items-center text-center bg-paper-50 dark:bg-ink-700/40 hover:bg-[#24A1DE]/5 dark:hover:bg-ink-700 border border-ink-100 dark:border-ink-600 hover:border-[#24A1DE] dark:hover:border-[#45baf2] p-6 rounded-2xl transition-all duration-300 hover:-translate-y-1 hover:shadow-lg cursor-pointer">
    
                <!-- Latar ikon menggunakan warna biru Telegram transparan -->
                <div class="bg-[#24A1DE]/10 dark:bg-[#24A1DE]/20 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-solid fa-chart-pie text-3xl text-[#24A1DE] dark:text-[#45baf2]"></i>
                </div>
                
                <h3 class="font-bold text-ink-800 dark:text-paper-50 mb-1 text-lg">Dasbor Web</h3>
                <p class="text-xs text-ink-500 dark:text-ink-300">Rekapitulasi kehadiran & statistik siswa.</p>
            </a>

            <!-- Link 2: Telegram Bot -->
            <!-- UBAH LINK T.ME DI BAWAH INI DENGAN USERNAME BOT ANDA -->
            <a href="https://t.me/SIPRESTISE_bot" target="_blank" class="group flex flex-col items-center text-center bg-paper-50 dark:bg-ink-700/40 hover:bg-blue-50 dark:hover:bg-ink-700 border border-ink-100 dark:border-ink-600 hover:border-blue-400 dark:hover:border-blue-500 p-6 rounded-2xl transition-all duration-300 hover:-translate-y-1 hover:shadow-lg cursor-pointer">
                <!-- Bagian ini yang diubah: Background biru pudar, icon biru Telegram -->
                <div class="bg-[#24A1DE]/10 dark:bg-[#24A1DE]/20 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-brands fa-telegram text-3xl text-[#24A1DE] dark:text-[#45baf2]"></i>
                </div>
                <h3 class="font-bold text-ink-800 dark:text-paper-50 mb-1 text-lg">Telegram Bot</h3>
                <p class="text-xs text-ink-500 dark:text-ink-300">Terima notifikasi real-time untuk orang tua.</p>
            </a>

        </div>
    </div>

    <script>
        // Logika Toggle Tema
        var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        var themeToggleBtn = document.getElementById('theme-toggle');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SI PRESTISE</title>
    <link rel="icon" type="image/png" href="Logosiprestise.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <style>
        .pattern-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .dark .pattern-bg {
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
        }
    </style>
</head>
<!-- 1. Tambahkan class "flex-col" pada tag body -->
<body class="pattern-bg min-h-screen flex flex-col items-center justify-center p-4 relative text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <!-- 2. Ganti tombol absolute sebelumnya dengan Container Tombol Atas ini -->
    <div class="w-full max-w-md flex justify-between items-center mb-4 z-10 relative">
        <!-- Tombol Kembali -->
        <a href="landing.html" class="flex items-center gap-2 text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 transition font-semibold group bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md text-sm md:text-base">
            <i class="fa-solid fa-arrow-left transform group-hover:-translate-x-1 transition"></i>
            Kembali
        </a>

        <!-- Tombol Tema -->
        <button id="theme-toggle" type="button" class="text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm border border-slate-200 dark:border-slate-700 rounded-full p-2.5 md:p-3 transition shadow-sm hover:shadow-md cursor-pointer">
            <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden text-lg text-blue-900 dark:text-blue-300"></i>
            <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden text-lg text-yellow-400"></i>
        </button>
    </div>

    <!-- 3. Kotak Login Utama -->
    <div class="bg-white dark:bg-slate-800 p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100 dark:border-slate-700 relative overflow-hidden transition-colors duration-300">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-700 to-blue-400"></div>

        <div class="text-center mb-8 mt-2">
            <!-- Logo yang Anda tambahkan sebelumnya -->
            <img src="Logosiprestise.png" alt="Logo SI PRESTISE" class="h-20 md:h-24 w-auto mx-auto object-contain drop-shadow-md mb-4 transition-transform hover:scale-105 duration-300">
            
            <h1 class="text-2xl font-extrabold text-blue-900 dark:text-blue-300 tracking-wide">SI PRESTISE</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Masuk ke Dasbor Admin Sekolah</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <!-- ... (Sisa kode form Anda di bawah sini biarkan saja seperti sebelumnya) ... -->
            
            <div id="errorMsg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative text-sm text-center font-medium" role="alert">
                Username atau Password salah!
            </div>

            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-slate-400 dark:text-slate-500"></i>
                    </div>
                    <input type="text" id="username" class="pl-10 w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition shadow-sm" placeholder="Masukkan Username" required>
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-400 dark:text-slate-500"></i>
                    </div>
                    <input type="password" id="password" class="pl-10 pr-12 w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition shadow-sm" placeholder="Masukkan Password" required>
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition cursor-pointer">
                        <i id="eyeIcon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5 mt-4 flex justify-center items-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed">
                <span id="btnText">Masuk Sistem</span> 
                <i id="btnIcon" class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            const togglePasswordBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            togglePasswordBtn.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                if (type === 'text') {
                    eyeIcon.classList.remove('fa-eye');
                    eyeIcon.classList.add('fa-eye-slash');
                } else {
                    eyeIcon.classList.remove('fa-eye-slash');
                    eyeIcon.classList.add('fa-eye');
                }
            });

            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const errorMsg = document.getElementById('errorMsg');
            
            const API_URL = "https://script.google.com/macros/s/AKfycbxOuZ1vG-GF4f3NFOg5Cs937tk1stWg069sB0gc5unf1WPVxKLgiZARHUdx9rdrB0px/exec";

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault(); 
                
                const usernameVal = document.getElementById('username').value;
                const passwordVal = document.getElementById('password').value;

                // Ubah tampilan tombol menjadi loading
                submitBtn.disabled = true;
                btnText.innerText = "Memverifikasi...";
                btnIcon.classList.remove('fa-arrow-right');
                btnIcon.classList.add('fa-spinner', 'fa-spin');
                errorMsg.classList.add('hidden'); // Sembunyikan error sebelumnya

                try {
                    const response = await fetch(`${API_URL}?action=login&username=${encodeURIComponent(usernameVal)}&password=${encodeURIComponent(passwordVal)}`);
                    const result = await response.json();

                    
                    if (result.status === 'success' || result.success === true) {
                        sessionStorage.setItem("isLoggedIn", "true"); 
                        sessionStorage.setItem("userName", result.name);   // Menyimpan nama asli guru
                        sessionStorage.setItem("userRole", result.role);   // Menyimpan role asli
                        sessionStorage.setItem("userKelas", result.kelas); // Menyimpan otoritas kelas guru
                        
                        window.location.href = "dashboard-presensi.html";
                    } else {
                        errorMsg.innerText = result.message || "Username atau Password Salah!";
                        errorMsg.classList.remove('hidden');
                    }
                } catch (error) {
                    console.error("Error API:", error);
                    errorMsg.innerText = "Terjadi kesalahan jaringan. Coba lagi.";
                    errorMsg.classList.remove('hidden');
                } finally {
                    
                    submitBtn.disabled = false;
                    btnText.innerText = "Masuk Sistem";
                    btnIcon.classList.remove('fa-spinner', 'fa-spin');
                    btnIcon.classList.add('fa-arrow-right');
                }
            });

            var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
            var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
            var themeToggleBtn = document.getElementById('theme-toggle');

            if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                themeToggleLightIcon.classList.remove('hidden');
                document.documentElement.classList.add('dark');
            } else {
                themeToggleDarkIcon.classList.remove('hidden');
                document.documentElement.classList.remove('dark');
            }

            themeToggleBtn.addEventListener('click', function() {
                themeToggleDarkIcon.classList.toggle('hidden');
                themeToggleLightIcon.classList.toggle('hidden');

                if (localStorage.getItem('color-theme')) {
                    if (localStorage.getItem('color-theme') === 'light') {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('color-theme', 'dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('color-theme', 'light');
                    }
                } else {
                    if (document.documentElement.classList.contains('dark')) {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('color-theme', 'light');
                    } else {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('color-theme', 'dark');
                    }
                }
            });

        });
    </script>
</body>
</html>
